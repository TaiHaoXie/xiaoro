<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式对话测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        .message.assistant {
            display: flex;
            justify-content: flex-start;
        }
        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user .bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .message.assistant .bubble {
            background: white;
            color: #333;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .intent-tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            background: #e9ecef;
            color: #666;
            margin-bottom: 8px;
            display: inline-block;
        }
        .input-area {
            padding: 16px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 8px;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #667eea; }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #ccc;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }
        .examples {
            padding: 12px 16px;
            background: #f8f9fa;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .example-btn {
            padding: 6px 12px;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .example-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 智能导购助手</h1>
            <p>基于RAG的流式对话测试</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <div class="bubble">
                    您好！我是您的智能导购助手，很高兴为您服务。我可以帮您搜索商品、推荐好物、对比产品。请问有什么可以帮您？
                </div>
            </div>
        </div>

        <div class="examples">
            <button class="example-btn" onclick="sendExample('你好')">👋 问候</button>
            <button class="example-btn" onclick="sendExample('推荐一款手机')">📱 手机推荐</button>
            <button class="example-btn" onclick="sendExample('我想买耳机')">🎧 耳机推荐</button>
            <button class="example-btn" onclick="sendExample('耐克运动鞋')">👟 鞋子搜索</button>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入您的消息..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function sendExample(text) {
            messageInput.value = text;
            sendMessage();
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function addMessage(content, isUser, intent = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;

            let html = '';
            if (intent) {
                html += `<div class="intent-tag">🎯 意图: ${intent.type} (置信度: ${(intent.confidence * 100).toFixed(0)}%)</div>`;
            }
            html += `<div class="bubble">${content}</div>`;
            msgDiv.innerHTML = html;

            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="bubble typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            // 显示用户消息
            addMessage(message, true);
            messageInput.value = '';
            sendBtn.disabled = true;

            // 显示打字指示器
            addTypingIndicator();

            // 创建消息容器
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message assistant';
            msgDiv.id = 'currentResponse';
            chatArea.appendChild(msgDiv);

            let intentTag = '';
            let currentContent = '';
            let intentData = null;

            try {
                const response = await fetch('http://localhost:8000/api/v1/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('event:')) {
                            const event = line.substring(6).trim();
                            if (event === 'start') {
                                removeTypingIndicator();
                            }
                        } else if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.substring(5));
                                if (data.intent) {
                                    intentData = data;
                                    intentTag = `<div class="intent-tag">🎯 意图: ${data.intent} (置信度: ${(data.confidence * 100).toFixed(0)}%)</div>`;
                                } else if (data.content !== undefined) {
                                    if (!data.done) {
                                        currentContent += data.content;
                                        msgDiv.innerHTML = intentTag + `<div class="bubble">${currentContent}</div>`;
                                        chatArea.scrollTop = chatArea.scrollHeight;
                                    }
                                } else if (data.error) {
                                    msgDiv.innerHTML = intentTag + `<div class="bubble" style="color: red;">❌ 错误: ${data.error}</div>`;
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                msgDiv.innerHTML = `<div class="bubble" style="color: red;">❌ 连接错误: ${error.message}</div>`;
            }

            sendBtn.disabled = false;
            messageInput.focus();
        }
    </script>
</body>
</html>
