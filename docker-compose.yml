version: '3.8'

services:
  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== FastAPI应用 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/ecommerce
      - REDIS_URL=redis://redis:6379/0
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./static:/app/static
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ==================== Celery Worker ====================
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_celery_worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/ecommerce
      - REDIS_URL=redis://redis:6379/0
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
      - KIMI_API_KEY=${KIMI_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.worker worker --loglevel=info --concurrency=2
    restart: unless-stopped

  # ==================== Celery Beat (定时任务) ====================
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_celery_beat
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./app:/app/app
    command: celery -A app.tasks.worker beat --loglevel=info
    restart: unless-stopped

  # ==================== Flower (Celery监控) ====================
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_flower
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.worker flower --port=5555
    restart: unless-stopped

  # ==================== Nginx网关 ====================
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
      # - "443:443"  # 生产环境启用HTTPS
    depends_on:
      - app
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: ecommerce_network
